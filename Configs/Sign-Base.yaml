data:
    train: "./Data/train.pt"
    dev: "./Data/dev.pt"
    test_pt: "./Data/PT_baseline_test.pt"
    test_text: "./Data/secretTestSet500.txt"
    keys_text: "./Data/keys.txt"
    trg_text: "./Data/trg.txt"


    max_sent_length: 300 # Max Sentence Length
    skip_frames: 1   # Skip frames in the data, to reduce the data input size
    src_vocab: "./Configs/text_src_vocab.txt"


training:
    random_seed: 27   # Random seed for initialisation
    optimizer: "adam"   # Chosen optimiser (adam, ..)
    learning_rate: 0.001   # Initial model learning rate
    learning_rate_min: 0.0002 # Learning rate minimum, when training will stop
    weight_decay: 0.0   # Weight Decay
    clip_grad_norm: 5.0   # Gradient clipping value
    batch_size: 32    # Batch Size for training
    scheduling: "plateau"   # Scheduling at training time (plateau, ...)
    patience: 7  # How many epochs of no improvement causes a LR reduction
    decrease_factor: 0.7  # LR reduction factor, after the # of patience epochs
    early_stopping_metric: "dtw" # Which metric determines scheduling (DTW, loss, BT...)
    epochs: 20000  # How many epochs to run for
    validation_freq: 2000 # After how many steps to run a validation on the model
    logging_freq: 250  # After how many steps to log training progress
    eval_metric: "dtw"  # Evaluation metric during training (dtw','bt','mpjpe')
    model_dir: "./Models/Base-4L+4H+L1Loss" # Where the model shall be stored
    overwrite: False # Flag to overwrite a previous saved model in the model_dir
    continue: True  # Flag to continue from a previous saved model in the model_dir
    shuffle: True  # Flag to shuffle the data during training
    use_cuda: True  # Flag to use GPU cuda capabilities
    max_output_length: 300 # Max Output Length
    keep_last_ckpts: 1 # How many previous best/latest checkpoints to keep
    loss: "L1"  # Loss function (MSE, L1)
    bone_loss: "MSE"  # Loss function (MSE, L1)
    
    # Energy Model Configuration (Training only)
    use_energy: False  # Flag to enable energy-based regularization during training
    energy_weight: 5.0 # Weight for the energy loss term
    lambda_vel: 1.0 # Weight for velocity consistency
    lambda_acc: 0.3 # Weight for acceleration consistency
    
    # 【注意】推理阶段的配置请查看 model.diffusion 节点

model:
    trg_size: 534  # Size of target skeleton coordinates (150 for Inverse Kinematics body/hands)
    initializer: "xavier" # Model initialisation (Xavier, ...)
    bias_initializer: "zeros"  # Bias initialiser (Zeros, ...)
    embed_initializer: "xavier" # Embedding initialiser (Xavier, ...)
    just_count_in: False # Flag for Just Counter Data Augmentation
    gaussian_noise: False # Flag for Gaussian Noise Data Augmentation
    noise_rate: 5 # Gaussian Noise rate
    future_prediction: 0 # Future Prediction Data Augmentation if > 0
    encoder:  # Model Encoder
        type: "transformer"
        num_layers: 4 # Number of layers
        num_heads: 8 # Number of Heads
        embeddings:
            embedding_dim: 1024  # Embedding Dimension
            dropout: 0.0 # Embedding Dropout
        hidden_size: 1024 # Hidden Size Dimension
        ff_size: 4096 # Feed-forward dimension (4 x hidden_size)
        dropout: 0.0 # Encoder Dropout
    diffusion:
        timesteps: 1000
        sampling_timesteps: 5
        scale: 1.0
        num_layers: 4
        num_heads: 8
        hidden_size: 1024
        ff_size: 4096
        dropout: 0.0
        embeddings:
          embedding_dim: 1024 # Embedding Dimension
          dropout: 0.0 # Embedding Dropout
        
        # ==========================================
        # 【检索增强配置】训练和推理共用
        # ==========================================
        use_retrieval: True
        retrieval_type: "gloss"
        
        # 【新增】Retrieval Dropout 概率 (0.3 ~ 0.5)
        retrieval_dropout_prob: 0.3
        
        # 【新增】Velocity Loss 权重 (0.1 ~ 0.3)
        velocity_loss_weight: 0.2
        
        # Gloss 检索专用参数
        gloss_db_path: "./Data/phoenix_gloss2pose_results.pkl"  # Gloss-Pose 数据库路径
        text2gloss_path: "./Data/phoenix_text2gloss_results.pkl"  # Text2Gloss 预测结果（仅推理时使用）
        
        # Semantic 检索专用参数
        retrieval_top_k: 1    # 只取最相似的一个（仅 semantic 模式）
        
        # 检索引导强度控制
        retrieval_alpha_max: 0.7  # 最大引导强度（训练时课程学习，推理时固定）

        # ==========================================
        # 【能量引导配置】仅推理阶段使用
        # ==========================================
        use_energy_guidance: False  # Enable energy-guided sampling during inference
        energy_guidance_alpha: 0.1  # Guidance strength for energy gradient (0.05 ~ 0.2)
